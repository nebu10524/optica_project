file_uploads = On
upload_max_filesize = 20M
post_max_size = 25M
max_file_uploads = 20
memory_limit = 512M
max_execution_time = 120
max_input_time = 120
upload_tmp_dir = /tmp/php
sys_temp_dir = /tmp

display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_NOTICE & ~E_WARNING
error_log = /dev/stderr

